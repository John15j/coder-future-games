<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Greenville RP Court UI Redesign</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

/* =========================
   GLOBAL GAME THEME
========================= */

body{
    margin:0;
    font-family:Arial;
    background:radial-gradient(circle at top,#0b1a2a,#000);
    color:white;
    overflow:hidden;
}

/* HEADER */
header{
    position:fixed;
    top:0;
    left:0;
    right:0;
    height:50px;
    background:rgba(0,255,255,0.06);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 15px;
    z-index:10;
}

/* LAYOUT GRID */
.layout{
    display:grid;
    grid-template-columns:260px 1fr 280px;
    height:100vh;
    padding-top:50px;
}

/* LEFT SIDEBAR */
.sidebar{
    background:rgba(255,255,255,0.03);
    border-right:1px solid rgba(255,255,255,0.08);
    overflow:auto;
}

/* CASE CARD */
.case{
    background:rgba(255,255,255,0.05);
    margin:8px;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
    transition:0.2s;
}

.case:hover{
    transform:scale(1.02);
    background:rgba(0,255,255,0.1);
}

/* CENTER COURTROOM */
.stage{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    position:relative;
}

/* COURT VISUAL */
.courtBox{
    width:80%;
    height:60%;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(0,255,255,0.2);
    border-radius:15px;
    padding:15px;
    box-shadow:0 0 25px rgba(0,255,255,0.15);
}

/* RIGHT AI PANEL */
.aiPanel{
    background:rgba(0,255,255,0.05);
    border-left:1px solid rgba(255,255,255,0.08);
    padding:10px;
}

/* ACTION BAR */
.actionBar{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    height:70px;
    background:rgba(0,0,0,0.7);
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    border-top:1px solid rgba(0,255,255,0.2);
}

button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:linear-gradient(45deg,#00e5ff,#0077ff);
    color:white;
}

button:hover{
    transform:scale(1.05);
}

/* STATUS BADGE */
.badge{
    background:lime;
    color:black;
    padding:3px 8px;
    border-radius:20px;
    font-size:11px;
}

textarea,input{
    width:90%;
    margin:5px;
    padding:8px;
    border-radius:8px;
    border:none;
}

/* COURT TITLE */
.title{
    font-size:20px;
    margin-bottom:10px;
    text-shadow:0 0 10px cyan;
}

</style>
</head>

<body>

<header>
<b>🏛️ Greenville RP Court System</b>
<span class="badge">UI REDESIGN ACTIVE</span>
</header>

<div class="layout">

<!-- LEFT SIDEBAR -->
<div class="sidebar">

<h3 style="padding-left:10px;">📂 Cases</h3>

<div id="cases"></div>

<hr>

<h3 style="padding-left:10px;">➕ Create Case</h3>

<input id="citizen" placeholder="Citizen">
<input id="officer" placeholder="Officer">
<textarea id="evidence" placeholder="Evidence"></textarea>

<button onclick="createCase()" style="margin-left:10px;">Create Case</button>

</div>

<!-- CENTER COURTROOM -->
<div class="stage">

<div class="title">🏛️ COURTROOM ACTIVE</div>

<div class="courtBox" id="courtBox">
Select a case to begin trial
</div>

</div>

<!-- RIGHT AI PANEL -->
<div class="aiPanel">

<h3>🧠 AI JUDGE ASSIST</h3>

<div id="aiBox">
Waiting for case...
</div>

</div>

</div>

<!-- ACTION BAR -->
<div class="actionBar">

<button onclick="startCourt()">Start Court</button>
<button onclick="aiAssist()">AI Assist</button>
<button onclick="guilty()">Guilty</button>
<button onclick="notGuilty()">Not Guilty</button>
<button onclick="generatePDF()">Generate Report</button>

</div>

<script>

let data = JSON.parse(localStorage.getItem("greenville_ui")) || {
    cases:[]
};

let selected = null;
let verdict = "";

/* SAVE */
function save(){
    localStorage.setItem("greenville_ui", JSON.stringify(data));
}

/* CREATE CASE */
function createCase(){

    let c = {
        id:Date.now(),
        citizen:citizen.value,
        officer:officer.value,
        evidence:evidence.value,
        status:"Pending"
    };

    data.cases.unshift(c);
    save();
    render();
}

/* SELECT CASE */
function selectCase(id){
    selected = data.cases.find(c=>c.id===id);

    document.getElementById("courtBox").innerHTML = `
        <b>Citizen:</b> ${selected.citizen}<br><br>
        <b>Evidence:</b><br>${selected.evidence}
    `;

    aiAssist();
}

/* COURT */
function startCourt(){
    if(!selected) return alert("Select case first");
}

/* AI */
function aiAssist(){

    if(!selected) return;

    let e = selected.evidence.toLowerCase();

    let msg =
    e.includes("speed") ? "Recommend Guilty (Traffic)" :
    e.includes("damage") ? "Recommend Guilty (Property Damage)" :
    "Manual review required";

    document.getElementById("aiBox").innerText = msg;
}

/* VERDICT */
function guilty(){
    if(!selected) return;

    selected.status = "Guilty";
    verdict = "GUILTY";
    save();
    render();
}

function notGuilty(){
    if(!selected) return;

    selected.status = "Not Guilty";
    verdict = "NOT GUILTY";
    save();
    render();
}

/* PDF */
function generatePDF(){

    const { jsPDF } = window.jspdf;
    let doc = new jsPDF();

    doc.text("GREENVILLE RP COURT REPORT", 10, 10);
    doc.text("Citizen: " + selected.citizen, 10, 20);
    doc.text("Verdict: " + selected.status, 10, 30);

    doc.save("report.pdf");
}

/* RENDER */
function render(){

    let div = document.getElementById("cases");

    div.innerHTML = data.cases.map(c=>`
        <div class="case" onclick="selectCase(${c.id})">
            <b>${c.citizen}</b><br>
            <small>${c.status}</small>
        </div>
    `).join("");
}

render();

</script>

</body>
</html>
