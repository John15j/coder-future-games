<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JusticeOS v5 - DOJ Courtroom Engine</title>

<style>
body { margin:0; overflow:hidden; font-family:Arial; background:#050816; }

#ui {
  position:absolute;
  top:10px; left:10px;
  width:340px;
  background:#0f172a;
  padding:12px;
  border-radius:10px;
  color:white;
  z-index:10;
}

button {
  width:100%;
  margin:5px 0;
  padding:10px;
  background:#1f2937;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

button:hover { background:#334155; }

input, textarea {
  width:100%;
  margin:5px 0;
  padding:8px;
  background:#111827;
  border:none;
  color:white;
  border-radius:6px;
}

.small { font-size:12px; color:#93c5fd; }
</style>
</head>

<body>

<div id="ui">
  <h3>⚖ JusticeOS v5</h3>

  <input id="caseName" placeholder="Case Title">
  <textarea id="caseStory" placeholder="Case Narrative"></textarea>

  <button onclick="createCase()">Create Case Script</button>

  <button onclick="nextScene()">▶ Next Court Scene</button>
  <button onclick="npcSpeak('judge')">🎙 Judge Speak</button>
  <button onclick="npcSpeak('lawyer')">🎙 Lawyer Speak</button>
  <button onclick="npcSpeak('witness')">🎙 Witness Speak</button>
  <button onclick="gavel()">🔨 Gavel</button>

  <div class="small" id="sceneText">Scene: Idle</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

/* =========================
   CORE 3D COURTROOM ENGINE
========================= */

const scene = new THREE.Scene();
scene.background = new THREE.Color("#050816");

const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,6,14);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* LIGHTS */
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,10,5);
scene.add(light);
scene.add(new THREE.AmbientLight(0x404040));

/* FLOOR */
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(25,25),
  new THREE.MeshStandardMaterial({ color:0x111827 })
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

/* COURT STRUCTURE */
function box(x,y,z,w,h,d,color){
  const m = new THREE.Mesh(
    new THREE.BoxGeometry(w,h,d),
    new THREE.MeshStandardMaterial({ color })
  );
  m.position.set(x,y,z);
  scene.add(m);
  return m;
}

/* JUDGE BENCH */
const judgeDesk = box(0,1,6,5,2,2,0x1f2937);

/* LAWYER TABLES */
box(-5,1,2,3,1.5,2,0x334155);
box(5,1,2,3,1.5,2,0x334155);

/* WITNESS STAND */
const witness = box(-7,1,-2,2,3,2,0x475569);

/* JURY BOX */
for(let i=-4;i<=4;i+=2){
  box(i,1,-6,1,1,1,0x111827);
}

/* NPC CHARACTERS (simple avatars) */
function npc(color,x,z){
  return box(x,2,z,1,2,1,color);
}

const judgeNPC = npc(0xfacc15,0,6);
const lawyerNPC = npc(0x60a5fa,-5,2);
const witnessNPC = npc(0x34d399,-7,-2);
const juryNPC = npc(0xa78bfa,2,-6);

/* GAVEL */
const gavel = box(1.5,3,6,1,0.2,0.4,0xd1a054);

/* =========================
   COURTROOM DIRECTOR SYSTEM
========================= */

let scenes = [
  "Court is now in session",
  "Opening statements",
  "Witness testimony",
  "Cross examination",
  "Evidence presentation",
  "Deliberation",
  "Verdict"
];

let sceneIndex = 0;

function nextScene(){
  sceneIndex = (sceneIndex + 1) % scenes.length;

  document.getElementById("sceneText").innerText =
    "Scene: " + scenes[sceneIndex];

  /* camera cinematic shift */
  camera.position.x = Math.sin(sceneIndex)*10;
  camera.position.z = Math.cos(sceneIndex)*10;

  speak("Scene changed to " + scenes[sceneIndex]);
}

/* =========================
   AI VOICE SYSTEM (browser TTS)
========================= */

function speak(text){
  let msg = new SpeechSynthesisUtterance(text);
  msg.rate = 1;
  msg.pitch = 1;
  speechSynthesis.speak(msg);
}

/* NPC DIALOGUE ENGINE */
function npcSpeak(type){

  let lines = {
    judge: [
      "Court is now in session.",
      "Order in the court.",
      "Proceed with testimony."
    ],
    lawyer: [
      "Your honor, I object.",
      "The evidence supports our claim.",
      "We request dismissal."
    ],
    witness: [
      "I saw everything clearly.",
      "I was at the scene that night.",
      "That is not what happened."
    ]
  };

  let line = lines[type][Math.floor(Math.random()*lines[type].length)];

  speak(line);

  /* NPC animation reaction */
  if(type === "judge") judgeNPC.position.y += 0.2;
  if(type === "lawyer") lawyerNPC.position.y += 0.2;
  if(type === "witness") witnessNPC.position.y += 0.2;
}

/* =========================
   GAVEL ANIMATION
========================= */

let striking = false;

function gavel(){
  if(striking) return;
  striking = true;

  let down = setInterval(()=>{
    gavel.position.y -= 0.3;
    if(gavel.position.y <= 1.5){
      clearInterval(down);

      let up = setInterval(()=>{
        gavel.position.y += 0.3;
        if(gavel.position.y >= 3){
          clearInterval(up);
          striking = false;
        }
      },20);
    }
  },20);

  speak("Order!");
}

/* =========================
   CASE SCRIPT SYSTEM
========================= */

function createCase(){
  let script = caseName.value + ": " + caseStory.value;
  speak("New case loaded: " + caseName.value);

  document.getElementById("sceneText").innerText =
    "Case Loaded: Script Active";

  lawyerNPC.material.color.set("#ef4444");
  witnessNPC.material.color.set("#22c55e");
}

/* CAMERA LOOP (cinematic orbit) */
let t = 0;

function animate(){
  requestAnimationFrame(animate);

  t += 0.003;

  camera.position.x = Math.sin(t)*14;
  camera.position.z = Math.cos(t)*14;
  camera.lookAt(0,2,0);

  renderer.render(scene,camera);
}

animate();

/* RESIZE */
window.addEventListener("resize",()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>

</body>
</html>
