<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERLC Judicial System</title>
<link rel="stylesheet" href="main.css">
</head>

<body>

<!-- HEADER -->
<header class="top-bar">

    <div class="header-left">
        <div class="logo">⚖ ERLC</div>
    </div>

    <div class="header-center">
        <div id="clock">00:00:00</div>
        <div class="sub">Court Operations Center</div>
    </div>

    <div class="header-right">
        <div class="judge-card">
            <div class="title">Chief Justice</div>
            <div class="name">Judge Andrade</div>
            <div class="status">Presiding</div>
        </div>
    </div>

</header>

<!-- DASHBOARD -->
<main id="dashboard">

    <h1 class="title">Court Operations Dashboard</h1>

    <div class="grid">

        <button class="card" onclick="openCourtLauncher()">
            ⚖ Start Court
        </button>

        <button class="card" onclick="openNewCase()">
            📁 New Case
        </button>

        <button class="card" onclick="openAllCases()">
            📚 All Cases
        </button>

        <button class="card" onclick="openSettings()">
            ⚙ Settings
        </button>

    </div>

</main>

<!-- COURT LAUNCHER -->
<div id="courtLauncher" class="popup hidden">
    <h2>Start Court</h2>
    <button onclick="showCaseSelector()">Select Case</button>
    <button onclick="startEmptyCourt()">Empty Court</button>
    <button onclick="closeAll()">Close</button>
</div>

<!-- CASE SELECTOR -->
<div id="caseSelector" class="popup hidden">
    <h2>Select Case</h2>
    <div id="caseList"></div>
    <button onclick="backToLauncher()">Back</button>
</div>

<!-- COURT READY -->
<div id="courtReady" class="popup hidden">
    <h2>Court Ready</h2>
    <div id="selectedCaseInfo"></div>
    <button onclick="startCourtSession()">Start Session</button>
    <button onclick="closeAll()">Cancel</button>
</div>

<!-- NEW CASE -->
<div id="newCasePopup" class="popup hidden">

    <h2>New Case</h2>

    <input id="caseTitle" placeholder="Case Title">
    <input id="defendant" placeholder="Defendant">

    <button onclick="saveCase()">Save</button>
    <button onclick="closeAll()">Cancel</button>

</div>

<!-- ALL CASES -->
<div id="allCasesPopup" class="popup hidden">
    <h2>All Cases</h2>
    <div id="allCasesList"></div>
    <button onclick="closeAll()">Close</button>
</div>

<!-- COURTROOM -->
<section id="courtroom" class="hidden">

    <h1>Courtroom</h1>

    <div class="court-grid">

        <div>
            <h3>Case Info</h3>
            <div id="caseInfo"></div>
        </div>

        <div>
            <h3>Court Log</h3>
            <div id="courtLog"></div>
        </div>

        <div>
            <h3>Evidence</h3>
            <div>No evidence yet</div>
        </div>

        <div>
            <h3>Judge Controls</h3>

            <button onclick="logEvent('Witness called')">Call Witness</button>
            <button onclick="logEvent('Evidence shown')">Evidence</button>
            <button onclick="logEvent('Arguments opened')">Arguments</button>
            <button onclick="logEvent('Verdict issued')">Verdict</button>

        </div>

    </div>

</section>

<script src="app.js"></script>

</body>
</html>
