<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>6 House HOA RP System v4</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    background: radial-gradient(circle at top, #0f172a, #05060a);
    color:white;
}

header{
    padding:15px;
    text-align:center;
    background:rgba(255,255,255,0.05);
    font-weight:bold;
}

.container{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    padding:10px;
}

.card{
    background:rgba(255,255,255,0.06);
    padding:10px;
    border-radius:12px;
    margin:8px 0;
    border:1px solid rgba(255,255,255,0.1);
    transition:0.2s;
}

.card:hover{
    transform:scale(1.02);
}

input{
    padding:8px;
    margin:5px;
    width:90%;
    border:none;
    border-radius:8px;
}

button{
    padding:8px;
    margin:3px;
    border:none;
    border-radius:8px;
    background:linear-gradient(45deg,#00c6ff,#0072ff);
    color:white;
    cursor:pointer;
}

.small{
    font-size:12px;
    opacity:0.7;
}

.log{
    background:rgba(0,0,0,0.3);
    padding:10px;
    border-radius:10px;
    height:200px;
    overflow:auto;
    font-size:12px;
}
</style>
</head>

<body>

<header>
🏡 6 HOUSE HOA RP SYSTEM v4 — LOCAL STORAGE EDITION
</header>

<div class="container">

<!-- LEFT -->
<div>
    <h3>🏠 Create Case</h3>

    <input id="house" placeholder="House # (1-6)">
    <input id="type" placeholder="Violation Type">
    <input id="fine" placeholder="Fine Amount">

    <button onclick="createCase()">Create Case</button>

    <h3>💰 HOA Treasury: $<span id="money">0</span></h3>

    <h3>🏘️ Houses</h3>
    <div id="houses"></div>
</div>

<!-- RIGHT -->
<div>
    <h3>📜 Active + Past Cases</h3>
    <div id="cases"></div>

    <h3>📡 Activity Log</h3>
    <div class="log" id="log"></div>
</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("hoa_v4")) || {
    money: 1000,
    houses: [
        {id:1,owner:"None",status:"Good",score:100},
        {id:2,owner:"None",status:"Good",score:100},
        {id:3,owner:"None",status:"Good",score:100},
        {id:4,owner:"None",status:"Good",score:100},
        {id:5,owner:"None",status:"Good",score:100},
        {id:6,owner:"None",status:"Good",score:100}
    ],
    cases: [],
    log:[]
};

function save(){
    localStorage.setItem("hoa_v4", JSON.stringify(data));
}

function log(msg){
    data.log.unshift(`[${new Date().toLocaleTimeString()}] ${msg}`);
    save();
}

/* CREATE CASE */
function createCase(){
    let c = {
        id: Date.now(),
        house: document.getElementById("house").value,
        type: document.getElementById("type").value,
        fine: parseInt(document.getElementById("fine").value),
        status: "Pending",
        time: new Date().toLocaleString()
    };

    data.cases.unshift(c);
    log(`Case created for House ${c.house} (${c.type})`);
    save();
    render();
}

/* RESOLVE CASE */
function resolveCase(id, approve){
    let c = data.cases.find(x=>x.id===id);
    if(!c) return;

    if(approve){
        data.money += c.fine;

        let h = data.houses.find(x=>x.id == c.house);
        if(h){
            h.status = "Warning";
            h.score -= 10;
        }

        c.status = "Approved";
        log(`Case #${id} APPROVED for House ${c.house}`);
    } else {
        c.status = "Denied";
        log(`Case #${id} DENIED`);
    }

    save();
    render();
}

/* HOUSE DISPLAY */
function renderHouses(){
    let div = document.getElementById("houses");
    div.innerHTML = "";

    data.houses.forEach(h=>{
        div.innerHTML += `
        <div class="card">
            <b>House ${h.id}</b><br>
            Owner: ${h.owner}<br>
            Status: ${h.status}<br>
            Score: ${h.score}
        </div>
        `;
    });
}

/* CASE DISPLAY */
function renderCases(){
    let div = document.getElementById("cases");
    div.innerHTML = "";

    data.cases.forEach(c=>{
        div.innerHTML += `
        <div class="card">
            <b>Case #${c.id}</b><br>
            House: ${c.house}<br>
            Type: ${c.type}<br>
            Fine: $${c.fine}<br>
            Status: ${c.status}<br>
            Time: ${c.time}<br>

            ${c.status === "Pending" ? `
                <button onclick="resolveCase(${c.id},true)">Approve</button>
                <button onclick="resolveCase(${c.id},false)">Deny</button>
            ` : `<span class="small">Finalized</span>`}
        </div>
        `;
    });
}

/* LOG */
function renderLog(){
    document.getElementById("log").innerHTML =
        data.log.map(l=>`<div>${l}</div>`).join("");
}

/* MONEY */
function updateMoney(){
    document.getElementById("money").innerText = data.money;
}

/* MAIN */
function render(){
    updateMoney();
    renderHouses();
    renderCases();
    renderLog();
}

render();
</script>

</body>
</html>
