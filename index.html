<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Greenville RP Court CMS</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

/* =========================
   GOVERNMENT UI THEME
========================= */

body{
    margin:0;
    font-family:Arial;
    background:#0b0f14;
    color:#e6e6e6;
}

/* TOP BAR */
.topbar{
    background:#111823;
    padding:10px;
    display:flex;
    justify-content:space-between;
    border-bottom:1px solid #1f2a38;
}

/* LAYOUT */
.layout{
    display:grid;
    grid-template-columns:280px 1fr 320px;
    height:calc(100vh - 50px);
}

/* SIDEBAR */
.sidebar{
    background:#0f1620;
    border-right:1px solid #1f2a38;
    padding:10px;
    overflow:auto;
}

/* MAIN */
.main{
    padding:10px;
    overflow:auto;
}

/* RIGHT PANEL */
.right{
    background:#0f1620;
    border-left:1px solid #1f2a38;
    padding:10px;
    overflow:auto;
}

/* CASE CARD */
.case{
    background:#151f2b;
    padding:10px;
    margin:8px 0;
    border-radius:8px;
    cursor:pointer;
    border:1px solid #1f2a38;
}

.case:hover{
    border-color:#00bfff;
}

/* INPUTS */
input, textarea, select{
    width:95%;
    padding:8px;
    margin:5px 0;
    background:#0b0f14;
    border:1px solid #2a3a4f;
    color:white;
    border-radius:6px;
}

/* BUTTONS */
button{
    padding:8px 10px;
    margin:4px 0;
    width:100%;
    background:#00bfff;
    border:none;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#0093cc;
}

/* STATUS TAG */
.tag{
    font-size:11px;
    padding:3px 6px;
    border-radius:6px;
    background:#2a3a4f;
    display:inline-block;
}

/* PANEL TITLE */
h3{
    border-bottom:1px solid #1f2a38;
    padding-bottom:5px;
}

/* AUDIT LOG */
.log{
    font-size:12px;
    opacity:0.85;
    margin:4px 0;
}

</style>
</head>

<body>

<div class="topbar">
    <b>🏛️ GREENVILLE RP COURT MANAGEMENT SYSTEM</b>
    <span class="tag" id="roleTag">ROLE: CLERK</span>
</div>

<div class="layout">

<!-- SIDEBAR -->
<div class="sidebar">

<h3>👤 Role</h3>
<select id="role">
<option>Officer</option>
<option>Clerk</option>
<option>Judge</option>
<option>Admin</option>
</select>
<button onclick="setRole()">Set Role</button>

<h3>📂 File New Case</h3>
<input id="citizen" placeholder="Citizen Name">
<input id="officer" placeholder="Officer Name">
<select id="type">
<option>Traffic Violation</option>
<option>Property Damage</option>
<option>Criminal Offense</option>
<option>Disturbance</option>
</select>
<textarea id="evidence" placeholder="Evidence Report"></textarea>

<button onclick="createCase()">Submit Case</button>

</div>

<!-- MAIN DATABASE -->
<div class="main">

<h3>🗃️ CASE DATABASE</h3>

<input id="search" oninput="render()" placeholder="Search cases...">

<div id="caseList"></div>

</div>

<!-- RIGHT PANEL -->
<div class="right">

<h3>⚖️ CASE DETAILS</h3>

<div id="details">Select a case</div>

<hr>

<h3>🧠 JUDGE PANEL</h3>

<select id="verdict">
<option>Pending</option>
<option>Guilty</option>
<option>Not Guilty</option>
<option>Dismissed</option>
</select>

<textarea id="sentence" placeholder="Judge notes / sentencing..."></textarea>

<button onclick="updateCase()">Apply Judgment</button>

<hr>

<h3>📜 COURT REPORT</h3>
<button onclick="generateReport()">Generate PDF</button>

<hr>

<h3>📡 AUDIT LOG</h3>
<div id="logBox"></div>

</div>

</div>

<script>

let db = JSON.parse(localStorage.getItem("greenville_cms")) || {
    cases:[],
    log:[]
};

let selected = null;
let role = "Clerk";

/* SAVE */
function save(){
    localStorage.setItem("greenville_cms", JSON.stringify(db));
}

/* LOG SYSTEM */
function log(msg){
    db.log.unshift(`[${new Date().toLocaleTimeString()}] ${msg}`);
    save();
}

/* ROLE */
function setRole(){
    role = document.getElementById("role").value;
    roleTag.innerText = "ROLE: " + role;
}

/* CREATE CASE */
function createCase(){

    if(role !== "Officer" && role !== "Clerk" && role !== "Admin"){
        alert("No permission");
        return;
    }

    let c = {
        id:Date.now(),
        citizen:citizen.value,
        officer:officer.value,
        type:type.value,
        evidence:evidence.value,
        status:"Filed",
        sentence:"",
        verdict:"Pending"
    };

    db.cases.unshift(c);
    log("Case filed: " + c.citizen);
    save();
    render();
}

/* SELECT CASE */
function selectCase(id){
    selected = db.cases.find(c=>c.id===id);

    details.innerHTML = `
        <b>Citizen:</b> ${selected.citizen}<br>
        <b>Officer:</b> ${selected.officer}<br>
        <b>Type:</b> ${selected.type}<br>
        <b>Evidence:</b><br>${selected.evidence}<br>
        <b>Status:</b> ${selected.verdict}
    `;
}

/* UPDATE CASE */
function updateCase(){

    if(role !== "Judge" && role !== "Admin"){
        alert("Judge only action");
        return;
    }

    selected.verdict = verdict.value;
    selected.sentence = sentence.value;

    log("Case updated: " + selected.citizen + " → " + selected.verdict);

    save();
    render();
}

/* PDF REPORT */
function generateReport(){

    if(!selected) return;

    const { jsPDF } = window.jspdf;
    let doc = new jsPDF();

    doc.text("GREENVILLE RP COURT REPORT", 10, 10);
    doc.text("Citizen: " + selected.citizen, 10, 20);
    doc.text("Officer: " + selected.officer, 10, 30);
    doc.text("Type: " + selected.type, 10, 40);
    doc.text("Verdict: " + selected.verdict, 10, 50);
    doc.text("Sentence: " + selected.sentence, 10, 60);

    doc.save("court_report.pdf");

    log("Report generated");
}

/* RENDER DATABASE */
function render(){

    let q = search.value?.toLowerCase() || "";

    caseList.innerHTML = db.cases
    .filter(c => c.citizen.toLowerCase().includes(q))
    .map(c=>`
        <div class="case" onclick="selectCase(${c.id})">
            <b>${c.citizen}</b><br>
            <span class="tag">${c.verdict}</span>
        </div>
    `).join("");

    logBox.innerHTML = db.log.slice(0,10).map(l=>`<div class="log">${l}</div>`).join("");
}

render();

</script>

</body>
</html>
