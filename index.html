<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Greenville RP Court Game</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:black;
    color:white;
    overflow:hidden;
}

/* SCREENS */
.screen{
    position:absolute;
    width:100%;
    height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    transition:all 0.5s ease;
}

.screen.active{
    display:flex;
}

/* INTRO */
#intro{
    background:radial-gradient(circle,#0a1a2a,#000);
    font-size:28px;
    animation:fadeIn 2s ease;
}

/* DASHBOARD */
#dashboard{
    background:#05070d;
}

/* COURTROOM */
#court{
    background:linear-gradient(180deg,#111,#000);
}

/* CARDS */
.card{
    background:rgba(255,255,255,0.06);
    padding:10px;
    border-radius:10px;
    margin:5px;
    width:300px;
}

/* BUTTONS */
button{
    padding:10px;
    margin:5px;
    border:none;
    border-radius:8px;
    background:#00bfff;
    color:white;
    cursor:pointer;
}

/* ANIMATION */
@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

/* COURT STAGE EFFECT */
.glow{
    text-shadow:0 0 10px cyan;
}

/* AI BOX */
#aiBox{
    background:rgba(0,255,255,0.1);
    padding:10px;
    border-radius:10px;
    width:300px;
}
</style>
</head>

<body>

<!-- INTRO SCREEN -->
<div id="intro" class="screen active">
    🏛️ GREENVILLE RP COURT GAME<br><br>
    <button onclick="startGame()">ENTER COURT SYSTEM</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="screen">

<h2 class="glow">CASE DASHBOARD</h2>

<div>
<input id="citizen" placeholder="Citizen Name">
<input id="officer" placeholder="Officer Name">
<textarea id="evidence" placeholder="Evidence"></textarea>
</div>

<button onclick="createCase()">Create Case</button>
<button onclick="enterCourt()">Enter Courtroom</button>

<div id="cases"></div>

</div>

<!-- COURTROOM -->
<div id="court" class="screen">

<h2 class="glow">🏛️ COURT IN SESSION</h2>

<div id="courtView" class="card">No Case Selected</div>

<button onclick="aiAssist()">🧠 AI Judge Assist</button>
<button onclick="guilty()">⚖️ Guilty</button>
<button onclick="notGuilty()">❌ Not Guilty</button>
<button onclick="generateSpeech()">🎤 AI Closing Speech</button>
<button onclick="generatePDF()">📜 Final Report</button>

<div id="aiBox">AI Waiting...</div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("greenville_game")) || {
    cases:[]
};

let selected = null;
let verdict = "";

/* SCREEN SWITCH */
function show(id){
    document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* START */
function startGame(){
    show("dashboard");
}

/* CREATE CASE */
function createCase(){

    let c = {
        id:Date.now(),
        citizen:citizen.value,
        officer:officer.value,
        evidence:evidence.value,
        status:"Filed"
    };

    data.cases.unshift(c);
    save();
    render();
}

/* SAVE */
function save(){
    localStorage.setItem("greenville_game", JSON.stringify(data));
}

/* SELECT CASE */
function selectCase(id){
    selected = data.cases.find(c=>c.id===id);

    document.getElementById("courtView").innerHTML = `
        <b>${selected.citizen}</b><br>
        ${selected.evidence}
    `;
}

/* ENTER COURT (ANIMATION) */
function enterCourt(){
    if(!selected) return alert("Select case first");
    show("court");
}

/* AI ASSIST */
function aiAssist(){

    let e = selected.evidence.toLowerCase();

    let msg =
    e.includes("speed") ? "Recommend Guilty: Traffic violation" :
    e.includes("damage") ? "Recommend Guilty: Property damage" :
    "Judge discretion required";

    document.getElementById("aiBox").innerText = "AI: " + msg;
}

/* VERDICTS */
function guilty(){
    selected.status = "Guilty";
    verdict = "GUILTY";
    save();
}

function notGuilty(){
    selected.status = "Not Guilty";
    verdict = "NOT GUILTY";
    save();
}

/* AI SPEECH GENERATOR */
function generateSpeech(){

    let speech =
    verdict === "GUILTY"
    ? "Court finds the defendant guilty based on presented evidence."
    : "Court finds insufficient evidence. Case dismissed.";

    document.getElementById("aiBox").innerText = "🧑‍⚖️ Judge Speech:\n" + speech;
}

/* PDF */
function generatePDF(){

    const { jsPDF } = window.jspdf;
    let doc = new jsPDF();

    doc.text("GREENVILLE RP COURT REPORT", 10, 10);
    doc.text("Citizen: " + selected.citizen, 10, 20);
    doc.text("Evidence: " + selected.evidence, 10, 30);
    doc.text("Verdict: " + selected.status, 10, 40);

    doc.save("court_report.pdf");
}

/* RENDER */
function render(){

    let div = document.getElementById("cases");

    div.innerHTML = data.cases.map(c=>`
        <div class="card" onclick="selectCase(${c.id})">
            <b>${c.citizen}</b><br>
            ${c.status}
        </div>
    `).join("");
}

render();

</script>

</body>
</html>
