<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HOA Court RP Simulator v2</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    background: radial-gradient(circle at top, #050b1a, #000000);
    color:white;
    overflow-x:hidden;
}

/* SPACE COURT THEME */
header{
    padding:15px;
    text-align:center;
    font-weight:bold;
    background:rgba(0,255,255,0.08);
    border-bottom:1px solid rgba(0,255,255,0.2);
    text-shadow:0 0 10px cyan;
}

.container{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    padding:10px;
}

/* PANELS */
.card{
    background:rgba(255,255,255,0.05);
    padding:10px;
    border-radius:12px;
    margin:8px 0;
    border:1px solid rgba(0,255,255,0.15);
    box-shadow:0 0 10px rgba(0,255,255,0.1);
}

/* BUTTONS */
button{
    padding:8px;
    margin:4px;
    border:none;
    border-radius:8px;
    background:linear-gradient(45deg,#00f0ff,#0066ff);
    color:white;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}

/* STAGES */
.stage{
    display:none;
}

.stage.active{
    display:block;
}

/* AI BOX */
.aiBox{
    background:rgba(0,255,255,0.05);
    border:1px solid cyan;
    padding:10px;
    border-radius:10px;
    min-height:120px;
    font-size:13px;
}

/* INPUTS */
input, textarea{
    width:90%;
    padding:8px;
    margin:5px;
    border-radius:8px;
    border:none;
}

/* JURY */
.jury{
    display:flex;
    gap:5px;
    flex-wrap:wrap;
}

.jury button{
    flex:1;
}
</style>
</head>

<body>

<header>
🏛️⚖️ SPACE COURT RP SYSTEM v2 — AI LEGAL SIMULATOR
</header>

<div class="container">

<!-- LEFT SIDE -->
<div>

<h3>📄 Case Intake</h3>

<input id="house" placeholder="House # (1-6)">
<input id="type" placeholder="Case Type (Ticket / Fine / Crime)">
<textarea id="evidence" placeholder="Evidence / Notes"></textarea>

<button onclick="createCase()">Submit Case</button>

<h3>📜 Cases</h3>
<div id="cases"></div>

</div>

<!-- RIGHT SIDE -->
<div>

<!-- COURT STAGES -->
<div id="preview" class="stage active">
    <h3>📄 Case Preview</h3>
    <div id="previewBox" class="card">Select a case</div>
    <button onclick="startCourt()">🚀 Start Court</button>
</div>

<div id="court" class="stage">
    <h3>🏛️ Court In Session</h3>
    <div id="courtBox" class="card"></div>

    <h3>👥 Jury Vote</h3>
    <div class="jury">
        <button onclick="vote('guilty')">Guilty</button>
        <button onclick="vote('not')">Not Guilty</button>
    </div>

    <button onclick="askAI()">🧠 Ask AI Legal Assistant</button>
</div>

<div id="final" class="stage">
    <h3>⚖️ Final Verdict</h3>
    <div id="finalBox" class="card"></div>
    <button onclick="reset()">New Case</button>
</div>

<h3>🧠 AI Legal Assistant</h3>
<div class="aiBox" id="aiBox">
Ask me anything about the case...
</div>

</div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("court_ai_v2")) || {
    cases:[]
};

let selected = null;

/* SAVE */
function save(){
    localStorage.setItem("court_ai_v2", JSON.stringify(data));
}

/* CREATE CASE */
function createCase(){
    let c = {
        id:Date.now(),
        house:document.getElementById("house").value,
        type:document.getElementById("type").value,
        evidence:document.getElementById("evidence").value
    };

    data.cases.unshift(c);
    save();
    renderCases();
}

/* SELECT CASE */
function selectCase(id){
    selected = data.cases.find(c=>c.id===id);

    document.getElementById("previewBox").innerHTML = `
        <b>House:</b> ${selected.house}<br>
        <b>Type:</b> ${selected.type}<br>
        <b>Evidence:</b> ${selected.evidence}
    `;
}

/* START COURT */
function startCourt(){
    if(!selected) return alert("Select a case first!");

    switchStage("court");

    document.getElementById("courtBox").innerHTML = `
        <b>Case Active:</b><br>
        House ${selected.house}<br>
        Type: ${selected.type}<br>
        Evidence Presented:<br>
        ${selected.evidence}
    `;
}

/* JURY VOTE */
let verdictResult = "";

function vote(v){
    switchStage("final");

    if(v === "guilty"){
        if(selected.type.toLowerCase().includes("crime")){
            verdictResult = "CRIMINAL SENTENCE ISSUED";
        } else {
            verdictResult = "FINE ISSUED";
        }
    } else {
        verdictResult = "CASE DISMISSED";
    }

    document.getElementById("finalBox").innerHTML = `
        <b>VERDICT:</b> ${v.toUpperCase()}<br><br>
        <b>OUTCOME:</b> ${verdictResult}
    `;
}

/* AI LEGAL SYSTEM (REAL FUNCTIONAL RULE-BASED AI) */
function askAI(){

    if(!selected){
        document.getElementById("aiBox").innerText = "Select a case first.";
        return;
    }

    let text = selected.evidence.toLowerCase();

    let response = "";

    if(text.includes("noise")){
        response = "This qualifies as a municipal violation. Recommend fine unless repeated offense.";
    }
    else if(text.includes("damage")){
        response = "Property damage may escalate to criminal classification depending on severity.";
    }
    else if(text.includes("parking")){
        response = "Parking violations typically result in fines under HOA policy.";
    }
    else{
        response = "Insufficient data. Recommend judge review and classify severity manually.";
    }

    document.getElementById("aiBox").innerText = "AI: " + response;
}

/* RESET */
function reset(){
    selected = null;
    switchStage("preview");
}

/* STAGES */
function switchStage(stage){
    document.querySelectorAll(".stage").forEach(s=>s.classList.remove("active"));
    document.getElementById(stage).classList.add("active");
}

/* RENDER */
function renderCases(){
    let div = document.getElementById("cases");
    div.innerHTML = "";

    data.cases.forEach(c=>{
        div.innerHTML += `
        <div class="card" onclick="selectCase(${c.id})">
            <b>Case #${c.id}</b><br>
            House ${c.house}<br>
            Type: ${c.type}
        </div>
        `;
    });
}

renderCases();

</script>

</body>
</html>
