<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JusticeOS v3 - Greenville Court Simulator</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #070b14;
  color: #e5e7eb;
  display: flex;
  height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  background: #0f172a;
  padding: 15px;
}

button {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  background: #1f2937;
  border: none;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

button:hover { background:#334155; }

.main {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
}

.card {
  background: #0f172a;
  padding: 12px;
  border-radius: 10px;
  margin: 10px 0;
}

input, textarea, select {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
  border-radius: 6px;
  background: #1f2937;
  color: white;
  border: none;
}

/* STREAM WINDOW */
.stream {
  height: 220px;
  background: black;
  border-radius: 10px;
  position: relative;
  overflow: hidden;
}

.live {
  position: absolute;
  top: 10px;
  left: 10px;
  background: red;
  padding: 3px 8px;
  font-size: 12px;
  border-radius: 4px;
}

.exhibit {
  font-size: 12px;
  color: #93c5fd;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>⚖ JusticeOS v3</h2>

  <button onclick="view('dashboard')">Dashboard</button>
  <button onclick="view('court')">Courtroom</button>
  <button onclick="view('evidence')">Evidence</button>
  <button onclick="view('archive')">Archive</button>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="card">
    <h3>Case Intake</h3>
    <input id="title" placeholder="Case Title">
    <textarea id="desc" placeholder="Case Description"></textarea>
    <button onclick="createCase()">Create Case File</button>
  </div>

  <div class="card">
    <h3>AI Case Narrative Generator</h3>
    <button onclick="generateAI()">Generate AI Narrative</button>
    <div id="aiOut"></div>
  </div>
</div>

<!-- COURTROOM -->
<div id="court" style="display:none;">

  <div class="card">
    <h3>📡 Live Courtroom Stream</h3>
    <div class="stream">
      <div class="live">🔴 LIVE</div>
      <div id="cameraText" style="padding:20px;"></div>
    </div>
  </div>

  <div class="card">
    <h3>Judge Panel</h3>

    <select id="phase">
      <option>Opening Statements</option>
      <option>Evidence Review</option>
      <option>Witness Testimony</option>
      <option>Deliberation</option>
      <option>Verdict</option>
    </select>

    <textarea id="verdict" placeholder="Judge ruling / notes"></textarea>

    <button onclick="advanceCourt()">Advance Court Phase</button>
  </div>

  <div class="card">
    <h3>📜 Court Transcript</h3>
    <div id="transcript"></div>
  </div>

  <div class="card">
    <h3>⚖ Sentencing Recommendation Engine</h3>
    <button onclick="sentence()">Generate Sentence</button>
    <div id="sentenceOut"></div>
  </div>

</div>

<!-- EVIDENCE -->
<div id="evidence" style="display:none;">
  <div class="card">
    <h3>Evidence Upload System</h3>
    <input type="file" id="file" multiple onchange="uploadEvidence()">
    <div id="evidenceList"></div>
  </div>
</div>

<!-- ARCHIVE -->
<div id="archive" style="display:none;">
  <div class="card">
    <h3>Case Archive</h3>
    <div id="archiveList"></div>
  </div>
</div>

</div>

<script>

let cases = JSON.parse(localStorage.getItem("g_cases")) || [];
let current = null;
let evidence = [];
let transcript = [];

/* NAV */
function view(p){
  document.querySelectorAll(".main > div").forEach(d => d.style.display="none");
  document.getElementById(p).style.display="block";
}

/* CREATE CASE */
function createCase(){
  current = {
    id: Date.now(),
    title: title.value,
    desc: desc.value,
    phase: "Intake",
    severity: Math.floor(Math.random()*100),
    exhibits: []
  };

  cases.push(current);
  save();
}

/* SAVE */
function save(){
  localStorage.setItem("g_cases", JSON.stringify(cases));
  renderArchive();
}

/* AI CASE NARRATIVE (SIMULATED) */
function generateAI(){
  if(!current) return alert("Create a case first");

  let n = `
CASE ANALYSIS REPORT

The defendant is under investigation for "${current.title}".
Evidence suggests moderate-to-high probability of involvement.

Severity Index: ${current.severity}/100

AI Assessment:
- Risk Level: ${current.severity > 60 ? "HIGH" : "MODERATE"}
- Recommended Action: ${current.severity > 70 ? "Immediate Trial" : "Further Review"}
`;

  document.getElementById("aiOut").innerText = n;
}

/* COURTROOM STREAM SIM */
let camIndex = 0;
setInterval(()=>{
  let scenes = [
    "Judge reviewing evidence files...",
    "Prosecutor presenting arguments...",
    "Defense cross-examining witness...",
    "Jury observing proceedings...",
    "Courtroom in session..."
  ];
  document.getElementById("cameraText").innerText = scenes[camIndex % scenes.length];
  camIndex++;
}, 2500);

/* COURT PHASES */
function advanceCourt(){
  let text = `PHASE: ${phase.value}\n${verdict.value}`;
  transcript.push(text);

  document.getElementById("transcript").innerHTML =
    transcript.map(t=>`<div>📄 ${t}</div>`).join("");
}

/* SENTENCING ENGINE */
function sentence(){
  if(!current) return;

  let base = current.severity;
  let years = Math.round(base / 10);

  document.getElementById("sentenceOut").innerHTML =
    `<b>Recommended Sentence:</b> ${years} years imprisonment (simulated guideline)`;
}

/* EVIDENCE UPLOAD */
function uploadEvidence(){
  let files = document.getElementById("file").files;

  for(let f of files){
    let reader = new FileReader();

    reader.onload = function(e){
      let item = {
        name: f.name,
        type: f.type,
        data: e.target.result,
        exhibit: "Exhibit " + String.fromCharCode(65 + evidence.length)
      };

      evidence.push(item);
      renderEvidence();
    };

    reader.readAsDataURL(f);
  }
}

/* DISPLAY EVIDENCE */
function renderEvidence(){
  document.getElementById("evidenceList").innerHTML =
    evidence.map(e=>`
      <div class="card">
        <b>${e.exhibit}: ${e.name}</b><br>
        ${e.type.includes("image") ? `<img src="${e.data}" width="100%">` : ""}
        ${e.type.includes("video") ? `<video src="${e.data}" controls width="100%"></video>` : ""}
      </div>
    `).join("");
}

/* ARCHIVE */
function renderArchive(){
  document.getElementById("archiveList").innerHTML =
    cases.map(c=>`
      <div class="card">
        <b>${c.title}</b><br>
        Severity: ${c.severity}
      </div>
    `).join("");
}

/* INIT STREAM TEXT */
setInterval(()=>{},1000);

</script>

</body>
</html>
