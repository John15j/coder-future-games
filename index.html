<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JusticeOS v2 - Government Court Simulator</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0f1a;
  color: #e5e7eb;
  display: flex;
  height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  background: #111827;
  padding: 15px;
}

.sidebar h2 {
  color: #60a5fa;
}

button {
  width: 100%;
  margin: 5px 0;
  padding: 10px;
  border: none;
  border-radius: 6px;
  background: #1f2937;
  color: white;
  cursor: pointer;
}

button:hover { background:#374151; }

.main {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
}

.card {
  background: #111827;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
}

input, textarea, select {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
  background: #1f2937;
  border: none;
  color: white;
  border-radius: 6px;
}

.case {
  padding: 8px;
  background: #1f2937;
  margin: 5px 0;
  cursor: pointer;
  border-radius: 6px;
}

.tag {
  font-size: 11px;
  background: #2563eb;
  padding: 2px 6px;
  border-radius: 5px;
}

.log {
  font-size: 12px;
  color: #9ca3af;
  max-height: 150px;
  overflow-y: auto;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>⚖ JusticeOS v2</h2>

  <select id="role" onchange="setRole()">
    <option>Judge</option>
    <option>Clerk</option>
    <option>Prosecutor</option>
    <option>Police</option>
  </select>

  <button onclick="view('dashboard')">Dashboard</button>
  <button onclick="view('cases')">Cases</button>
  <button onclick="view('intake')">Police Intake</button>
  <button onclick="view('warrant')">Warrants</button>
  <button onclick="view('archive')">Archive</button>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="page">
  <div class="card">
    <h3>System Status</h3>
    <p>Federal Judicial Network: ONLINE</p>
  </div>

  <div class="card">
    <h3>Create Case</h3>
    <input id="title" placeholder="Case Title">
    <textarea id="desc" placeholder="Case Description"></textarea>
    <button onclick="createCase()">Submit Case</button>
  </div>
</div>

<!-- CASES -->
<div id="cases" class="page" style="display:none;">
  <div class="card">
    <h3>Active Docket</h3>
    <input id="search" oninput="renderCases()" placeholder="Search cases...">
    <div id="caseList"></div>
  </div>

  <div class="card">
    <h3>Case Panel</h3>
    <div id="caseView">No case selected</div>

    <select id="status">
      <option>Intake</option>
      <option>Review</option>
      <option>Trial</option>
      <option>Verdict</option>
      <option>Closed</option>
    </select>

    <textarea id="verdict" placeholder="Judge notes"></textarea>

    <button onclick="saveCase()">Save</button>
    <button onclick="runJury()">Run Jury Vote</button>
  </div>
</div>

<!-- POLICE INTAKE -->
<div id="intake" class="page" style="display:none;">
  <div class="card">
    <h3>Police Case Intake</h3>

    <input id="crimeType" placeholder="Crime Type">
    <input id="location" placeholder="Location">
    <textarea id="report" placeholder="Incident Report"></textarea>

    <button onclick="createPoliceCase()">Submit Report</button>
  </div>
</div>

<!-- WARRANTS -->
<div id="warrant" class="page" style="display:none;">
  <div class="card">
    <h3>Warrant Generator</h3>

    <input id="suspect" placeholder="Suspect Name">
    <input id="reason" placeholder="Reason">
    <button onclick="generateWarrant()">Generate Warrant</button>

    <div id="warrantOut"></div>
  </div>
</div>

<!-- ARCHIVE -->
<div id="archive" class="page" style="display:none;">
  <div class="card">
    <h3>Closed Cases Archive</h3>
    <div id="archiveList"></div>
  </div>
</div>

<!-- LOGS -->
<div class="card">
  <h3>Audit Log</h3>
  <div id="logs" class="log"></div>
</div>

</div>

<script>
/* =========================
   GOVERNMENT SIM ENGINE
========================= */

let cases = JSON.parse(localStorage.getItem("gov_cases")) || [];
let selected = null;
let role = "Judge";

/* NETWORK SYNC */
const net = new BroadcastChannel("justice_network");
net.onmessage = () => {
  cases = JSON.parse(localStorage.getItem("gov_cases")) || [];
  renderCases();
  renderArchive();
};

/* LOGGING */
function log(msg) {
  const logs = document.getElementById("logs");
  const time = new Date().toLocaleTimeString();
  logs.innerHTML += `[${time}] ${msg}<br>`;
}

/* ROLE SYSTEM */
function setRole() {
  role = document.getElementById("role").value;
  log("Role changed to " + role);
}

/* NAV */
function view(p) {
  document.querySelectorAll(".page").forEach(x => x.style.display = "none");
  document.getElementById(p).style.display = "block";
}

/* CREATE CASE */
function createCase() {
  const c = {
    id: Date.now(),
    title: title.value,
    desc: desc.value,
    status: "Intake",
    evidence: [],
    verdict: ""
  };
  cases.push(c);
  save();
  log("Case created: " + c.title);
}

/* SAVE */
function save() {
  localStorage.setItem("gov_cases", JSON.stringify(cases));
  net.postMessage("sync");
  renderCases();
  renderArchive();
}

/* RENDER CASES */
function renderCases() {
  const q = document.getElementById("search")?.value?.toLowerCase() || "";
  const list = document.getElementById("caseList");
  if (!list) return;

  list.innerHTML = "";

  cases.filter(c => c.title.toLowerCase().includes(q)).forEach(c => {
    list.innerHTML += `
      <div class="case" onclick="openCase(${c.id})">
        ${c.title} <span class="tag">${c.status}</span>
      </div>
    `;
  });
}

/* OPEN */
function openCase(id) {
  selected = cases.find(c => c.id === id);
  document.getElementById("caseView").innerHTML = `
    <b>${selected.title}</b><br>
    ${selected.desc}<br>
    Evidence: ${selected.evidence.length}
  `;
}

/* SAVE CASE UPDATE */
function saveCase() {
  if (!selected) return;

  selected.status = status.value;
  selected.verdict = verdict.value;

  save();
  log("Case updated: " + selected.title);
}

/* POLICE INTAKE */
function createPoliceCase() {
  cases.push({
    id: Date.now(),
    title: crimeType.value,
    desc: report.value,
    status: "Intake",
    evidence: []
  });
  save();
  log("Police report filed");
}

/* WARRANT */
function generateWarrant() {
  document.getElementById("warrantOut").innerHTML =
    `<div class="card">
      WARRANT ISSUED<br>
      Suspect: ${suspect.value}<br>
      Reason: ${reason.value}<br>
      Authority: Federal Court System
    </div>`;
  log("Warrant generated for " + suspect.value);
}

/* JURY SYSTEM */
function runJury() {
  if (!selected) return;

  let guilty = Math.random() > 0.5;

  selected.verdict = guilty ? "GUILTY (JURY)" : "NOT GUILTY (JURY)";
  selected.status = "Verdict";

  save();
  log("Jury vote completed: " + selected.verdict);
}

/* ARCHIVE */
function renderArchive() {
  const a = document.getElementById("archiveList");
  if (!a) return;

  a.innerHTML = cases
    .filter(c => c.status === "Closed")
    .map(c => `<div class="case">${c.title}<br>${c.verdict}</div>`)
    .join("");
}

/* INIT */
renderCases();
renderArchive();
log("JusticeOS v2 initialized");
</script>

</body>
</html>
