<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Greenville RP Court System v3</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#05070d;
    color:white;
}

/* TOP BAR */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px;
    background:rgba(0,255,255,0.05);
}

.logo{
    width:45px;
    height:45px;
    border-radius:10px;
}

/* LAYOUT */
.container{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:10px;
    padding:10px;
}

/* PANELS */
.panel{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(0,255,255,0.1);
    border-radius:12px;
    padding:10px;
    height:85vh;
    overflow:auto;
}

/* CASE CARD */
.card{
    background:rgba(255,255,255,0.06);
    padding:10px;
    margin:8px 0;
    border-radius:10px;
    cursor:pointer;
    border:1px solid rgba(255,255,255,0.1);
}

/* INPUTS */
input, textarea, select{
    width:95%;
    padding:8px;
    margin:5px 0;
    border:none;
    border-radius:8px;
}

/* BUTTONS */
button{
    padding:8px;
    margin:4px;
    border:none;
    border-radius:8px;
    background:linear-gradient(45deg,#00e5ff,#0077ff);
    color:white;
    cursor:pointer;
}

/* COURT MODE */
.courtMode{
    display:none;
    background:black;
    padding:15px;
    border-radius:12px;
}

.courtMode.active{
    display:block;
}

/* AI BOX */
.aiBox{
    background:rgba(0,255,255,0.05);
    padding:10px;
    border-radius:10px;
    min-height:120px;
}

/* STATUS */
.badge{
    padding:4px 8px;
    background:#00e5ff;
    color:black;
    border-radius:20px;
    font-size:11px;
}
</style>
</head>

<div class="container">

<!-- LEFT: CASE CREATION -->
<div class="panel">

<h3>📄 Create Case</h3>

<input id="citizen" placeholder="Citizen Name">
<input id="officer" placeholder="Officer Name">

<select id="type">
<option>Traffic Violation</option>
<option>Property Damage</option>
<option>Criminal Offense</option>
<option>Disturbance</option>
</select>

<input id="fine" placeholder="Fine Amount">

<textarea id="evidence" placeholder="Evidence Notes"></textarea>

<input type="file" id="file">

<button onclick="createCase()">➕ Create Case</button>

<h3>📂 Cases</h3>
<div id="cases"></div>

</div>

<!-- MIDDLE: PREVIEW -->
<div class="panel">

<div id="preview">
<h3>📄 Case Preview</h3>
<div id="previewBox">Select a case</div>

<button onclick="enterCourt()">🏛️ Enter Court</button>
</div>

<div class="courtMode" id="court">

<h3>🏛️ LIVE COURTROOM</h3>

<div id="courtBox"></div>

<button onclick="aiJudgeHelp()">🧠 AI Judge Assistant</button>
<button onclick="guilty()">⚖️ Guilty</button>
<button onclick="notGuilty()">❌ Not Guilty</button>

<h3>🎤 AI Closing Statement</h3>
<div class="aiBox" id="ai"></div>

<button onclick="generatePDF()">📜 Generate Final Report</button>

</div>

</div>

<!-- RIGHT: LOG -->
<div class="panel">

<h3>📡 Court Log</h3>
<div id="log"></div>

</div>

</div>

<script>

/* DATABASE */
let data = JSON.parse(localStorage.getItem("greenville_v3")) || {
    cases:[],
    log:[]
};

let selected = null;
let verdict = "";

/* SAVE */
function save(){
    localStorage.setItem("greenville_v3", JSON.stringify(data));
}

/* LOG */
function log(msg){
    data.log.unshift(`[${new Date().toLocaleTimeString()}] ${msg}`);
    save();
}

/* CREATE CASE */
function createCase(){

    let file = document.getElementById("file").files[0];

    let reader = new FileReader();

    reader.onload = function(){

        let c = {
            id:Date.now(),
            citizen:document.getElementById("citizen").value,
            officer:document.getElementById("officer").value,
            type:document.getElementById("type").value,
            fine:document.getElementById("fine").value,
            evidence:document.getElementById("evidence").value,
            file:reader.result || null
        };

        data.cases.unshift(c);
        log("Case created: " + c.citizen);
        save();
        render();
    };

    if(file){
        reader.readAsDataURL(file);
    } else {
        reader.onload();
    }
}

/* SELECT CASE */
function selectCase(id){
    selected = data.cases.find(c=>c.id===id);

    document.getElementById("previewBox").innerHTML = `
        <b>${selected.citizen}</b><br>
        Type: ${selected.type}<br>
        Evidence: ${selected.evidence}<br>
        ${selected.file ? `<img src="${selected.file}" width="100">` : ""}
    `;

    log("Selected case " + selected.citizen);
}

/* ENTER COURT */
function enterCourt(){
    if(!selected) return alert("Select case first");

    document.getElementById("court").classList.add("active");

    document.getElementById("courtBox").innerHTML = `
        <b>Case:</b> ${selected.citizen}<br>
        <b>Officer:</b> ${selected.officer}<br>
        <b>Type:</b> ${selected.type}<br>
        <b>Evidence:</b> ${selected.evidence}
    `;

    log("Court session started");
}

/* AI JUDGE ASSIST */
function aiJudgeHelp(){

    let e = selected.evidence.toLowerCase();

    let msg = "";

    if(e.includes("speed")){
        msg = "Recommend: Guilty - Traffic violation confirmed.";
    }
    else if(e.includes("damage")){
        msg = "Recommend: Severe penalty or criminal escalation.";
    }
    else if(e.includes("noise")){
        msg = "Recommend: Minor fine or warning.";
    }
    else{
        msg = "Recommend judge discretion due to unclear evidence.";
    }

    document.getElementById("ai").innerText = msg;

    log("AI assistant activated");
}

/* VERDICTS */
function guilty(){
    verdict = "GUILTY";
    log("Verdict: GUILTY");
}

function notGuilty(){
    verdict = "NOT GUILTY";
    log("Verdict: NOT GUILTY");
}

/* PDF GENERATOR */
function generatePDF(){

    const { jsPDF } = window.jspdf;
    let doc = new jsPDF();

    doc.text("GREENVILLE RP COURT REPORT", 10, 10);
    doc.text("Citizen: " + selected.citizen, 10, 20);
    doc.text("Type: " + selected.type, 10, 30);
    doc.text("Verdict: " + verdict, 10, 40);
    doc.text("Evidence: " + selected.evidence, 10, 50);

    doc.save("court_report.pdf");

    log("PDF report generated");
}

/* RENDER CASES */
function render(){

    let div = document.getElementById("cases");
    div.innerHTML = "";

    data.cases.forEach(c=>{
        div.innerHTML += `
        <div class="card" onclick="selectCase(${c.id})">
            ${c.citizen}<br>
            ${c.type}
        </div>
        `;
    });

    document.getElementById("log").innerHTML =
        data.log.map(l=>`<div>${l}</div>`).join("");
}

render();

</script>

</body>
</html>
